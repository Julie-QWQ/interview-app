[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_any_generics = False
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
follow_imports = normal
strict_optional = True
strict_equality = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
plugins =

[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-psycopg2.extensions.*]
ignore_missing_imports = True

[mypy-psycopg2.extras.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-flask.*]
ignore_missing_imports = True

[mypy-flask_cors.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-pydub.*]
ignore_missing_imports = True

[mypy-websockets.*]
ignore_missing_imports = True

[mypy-pdfplumber.*]
ignore_missing_imports = True

# Ignore database cursor type inference issues
[mypy-app.db.database]
disable_error_code = no-any-return,index,call-overload,return-value,list-item,arg-type

# Ignore API complex type issues
[mypy-app.api.__init__]
disable_error_code = arg-type,attr-defined,misc,union-attr

[mypy-app.api.profiles_flask]
disable_error_code = arg-type,attr-defined

# Ignore service complex type issues
[mypy-app.services.asr_service]
disable_error_code = arg-type,return-value,import-untyped

[mypy-app.services.interview_orchestrator]
disable_error_code = arg-type,attr-defined,misc

[mypy-app.services.ai_service]
disable_error_code = arg-type,assignment,misc

[mypy-app.services.avatar_dialog_service]
disable_error_code = name-defined,union-attr

[mypy-app.services.tts_service]
disable_error_code = arg-type,no-any-return,import-not-found

[mypy-app.services.prompt_service]
disable_error_code = arg-type,assignment

[mypy-app.models.profile]
disable_error_code = arg-type,assignment

[mypy-tests.*]
ignore_errors = True

# Ignore specific API type issues that are complex to fix
[mypy-app.api.__init__]
disable_error_code = arg-type,attr-defined,misc,union-attr

[tool.mypy]
exclude = (?x)(
    ^backend/tests/|
    ^backend/.venv/|
    ^backend/venv/
    )
