stages:
  welcome:
    stage: welcome
    name: 开场介绍
    description: 欢迎候选人、介绍流程并开启对话
    max_turns: 2
    min_turns: 1
    time_allocation: 2
    system_instruction: 友好开场，鼓励候选人简洁自我介绍并进入第一个问题。
    enabled: true
    order: 1
  technical:
    stage: technical
    name: 技术问题
    description: 围绕岗位核心技能进行深入考察
    max_turns: 10
    min_turns: 5
    time_allocation: 18
    system_instruction: 根据回答深度逐步追问，关注技术理解与工程实践。
    enabled: true
    order: 2
  scenario:
    stage: scenario
    name: 情景问题
    description: 给出实际场景，评估分析与解决问题能力
    max_turns: 5
    min_turns: 2
    time_allocation: 8
    system_instruction: 用真实工作情景提问，重点看思路、权衡和决策。
    enabled: true
    order: 3
  closing:
    stage: closing
    name: 结束阶段
    description: 总结表现并礼貌收尾
    max_turns: 3
    min_turns: 2
    time_allocation: 2
    system_instruction: 简要总结亮点，给出积极反馈并结束面试。
    enabled: true
    order: 4
